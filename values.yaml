replicaCount: 1

image:
  repository: remnawave/subscription-page
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 3010

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: subscription.example.com
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Application specific configuration
app:
  port: 3010
  panelUrl: "https://panel.example.com"
  # Replace with your actual token or use an existing secret
  apiToken: "API_TOKEN_FROM_REMNAWAVE"
  # Alternatively, reference an existing secret
  existingSecret: ""
  
  # Optional: Serve at custom root path (e.g., 'sub'). Do not place / at start/end.
  customSubPrefix: ""
  # Optional: Support Marzban legacy links
  marzbanLegacyLinkEnabled: false
  marzbanLegacySecretKey: ""
  # Optional: Caddy auth API token if using 'Caddy with security' addon
  caddyAuthApiToken: ""
  # Optional: Cloudflare Zero Trust bypass
  cloudflareZeroTrustClientId: ""
  cloudflareZeroTrustClientSecret: ""
